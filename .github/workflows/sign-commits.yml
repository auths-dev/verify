name: Sign Commits
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'

permissions:
  contents: write

jobs:
  sign-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: auths-dev/sign@v1
        with:
          commits: 'HEAD~1..HEAD'
