name: 'Verify with Auths'
description: 'Verify cryptographic commit and artifact signatures on every PR using Auths identity keys.'
author: 'auths-dev'

inputs:
  token:
    description: 'Identity for verification. Accepts: AUTHS_CI_TOKEN JSON, identity bundle JSON, file path to bundle, or path to allowed_signers file. Default: .auths/allowed_signers'
    required: false
    default: ''
  commits:
    description: 'Git commit range to verify (defaults to PR commits or push commits)'
    required: false
    default: ''
  auths-version:
    description: 'Auths CLI version to use (leave empty for latest)'
    required: false
    default: ''
  fail-on-unsigned:
    description: 'Whether to fail the action if unsigned commits are found'
    required: false
    default: 'true'
  skip-merge-commits:
    description: 'Whether to skip merge commits during verification'
    required: false
    default: 'true'
  post-pr-comment:
    description: 'Post a PR comment with verification results and fix instructions (requires pull-requests: write)'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token used to post the PR comment (required when post-pr-comment is true)'
    required: false
    default: ''
  files:
    description: 'Glob patterns for artifact files to verify, one per line (e.g., "dist/*.tar.gz")'
    required: false
    default: ''
  artifact-attestation-dir:
    description: 'Directory containing .auths.json attestation files (default: alongside artifacts)'
    required: false
    default: ''
  fail-on-unattested:
    description: 'Fail the action if any artifact lacks a valid attestation'
    required: false
    default: 'true'

outputs:
  verified:
    description: 'Whether all commits were verified successfully'
  results:
    description: 'JSON array of per-commit verification results'
  total:
    description: 'Total number of commits checked'
  passed:
    description: 'Number of commits that passed verification'
  failed:
    description: 'Number of commits that failed verification'
  artifacts-verified:
    description: 'Whether all artifacts were verified (true/false)'
  artifact-results:
    description: 'JSON array of per-artifact verification results'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'shield'
  color: 'green'
